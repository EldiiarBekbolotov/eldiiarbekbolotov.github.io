   ================================================================ */
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const PALETTE = ["e53935","d32f2f","c62828","f4511e","fb8c00","ff8f00","f9a825","ffb300","ef6c00","b71c1c"];
function hash(str){ let h=0; for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))>>>0; return h; }
/* stable placeholder photo per seed */
const pic = (seed,w=600,h=400) => `https://picsum.photos/seed/${encodeURIComponent(seed)}/${w}/${h}`;
/* colored initials image per label (guarantees every item has an image) */
const badge = (label) => { const c = PALETTE[hash(label)%PALETTE.length];
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(label)}&background=${c}&color=fff&size=110&length=2&bold=true`; };

function sectionHead(icon,title,sub){
  return `<div class="section-head"><i class="material-icons">${icon}</i>
    <div><h5>${esc(title)}</h5>${sub?`<p class="grey-sub">${esc(sub)}</p>`:""}</div></div>`;
}
function section(id,icon,title,sub,body){
  return `<section id="${id}" class="section-block"><div class="container">${sectionHead(icon,title,sub)}${body}</div></section>`;
}

/* generic image-card grid with show-more */
function grid(items, limit, id){
  const cardHtml = items.map(h=>`<div class="col s12 m6 l4">${h}</div>`);
  const first = cardHtml.slice(0,limit).join("");
  const rest = cardHtml.slice(limit).join("");
  let out = `<div class="row">${first}</div>`;
  if(rest){
    out += `<div class="row extra-row" id="${id}-extra" style="display:none">${rest}</div>
      <div class="show-more-wrap"><button class="btn-flat waves-effect toggle-more teal-text" data-target="${id}-extra" data-count="${items.length}">
        <i class="material-icons left">expand_more</i>Show all ${items.length}</button></div>`;
  }
  return out;
}

              <select><option value="" disabled selected>Reason</option><option>Advisory call</option><option>Project sprint</option><option>Speaking invite</option><option>Just saying hi</option></select>
              <label>What's this about?</label></div>
            <div class="input-field col s12"><i class="material-icons prefix">message</i><textarea id="cf_msg" class="materialize-textarea"></textarea><label for="cf_msg">Message</label></div>
          </div>
          <button class="btn-large waves-effect red darken-1" type="submit"><i class="material-icons left">send</i>Send message</button>
        </form>
      </div></div></div>
      <div class="col s12 m5">
        <div class="card red darken-1 white-text"><div class="card-content">
          <span class="card-title"><i class="material-icons left">event_available</i>Availability</span>
          <p>Open to select freelance sprints and advisory calls this quarter.</p>
          <p style="margin-top:10px"><i class="material-icons tiny">place</i> ${esc(DATA.profile.location)}</p>
        </div></div>
        <div class="card"><div class="card-content">
          <span class="card-title-sm"><i class="material-icons left">mark_email_read</i>Newsletter</span>
          <p class="grey-sub">Occasional notes on web performance, a11y, and craft.</p>
          <form id="newsForm"><div class="input-field"><input id="nl_email" type="email"><label for="nl_email">Your email</label></div>
            <button class="btn waves-effect amber darken-2" type="submit">Subscribe</button></form>
        </div></div>
      </div>
    </div>`);
}

/* ---- Boot ---- */
function boot(){
  document.getElementById("app").innerHTML = [
    hero(),
    renderMetrics(),
    renderAbout(),
    renderServices(),
    renderPortfolio(),
    renderCaseStudies(),
    renderExperience(),
    renderSkills(),
    renderUses(),
    renderProjects(),
    renderOpenSource(),
    renderTalks(),
    renderWriting(),
    renderPress(),
    renderEducation(),
    renderCertifications(),
    renderVolunteering(),
    renderAwards(),
    renderTestimonials(),
    renderLanguages(),
    renderGallery(),
    renderBooks(),
    renderFAQ(),
    renderContact()
  ].join("");

  document.getElementById("footerName").textContent = DATA.profile.name;
  document.getElementById("footerLinks").innerHTML =
    DATA.profile.social.map(s=>`<li><a class="grey-text text-lighten-3" href="${esc(s.url)}">${esc(s.label)}</a></li>`).join("");

  // Initialise all Materialize components
  M.AutoInit();

  // Show-more toggles
  document.addEventListener("click",(e)=>{
    const t = e.target.closest(".toggle-more");
    if(t){
      const box = document.getElementById(t.dataset.target);
      const open = box.style.display !== "none";
      box.style.display = open ? "none" : "flex";
      t.innerHTML = open
        ? `<i class="material-icons left">expand_more</i>Show all ${t.dataset.count}`
        : `<i class="material-icons left">expand_less</i>Show less`;
    }
  });

  // Fake form submits -> toast
  ["contactForm","newsForm"].forEach(id=>{
    const f = document.getElementById(id);
    if(f) f.addEventListener("submit",(e)=>{ e.preventDefault(); M.toast({html:"Thanks! This is a demo form — wire it to your backend."}); f.reset(); });
  });
}

document.addEventListener("DOMContentLoaded", boot);
</script>
</body>
</html>
